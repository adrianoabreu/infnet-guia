# Versão do Kubernetes
apiVersion: apps/v1

# Tipo de recurso
kind: Deployment

# Metadados - Essenciais para o Kubernetes(nome, label, namespace)
metadata:
  name: guia-app
  labels:
    app: guia-app
# Especificação - O que o recurso deve fazer(replicas, selector, template)
spec: 
  replicas: 4
  selector:
    matchLabels:
      app: guia-app
  template:
    metadata:
      labels:
        app: guia-app
    spec:
      securityContext: 
        fsGroup: 1000
      containers:
        - name: guia-app
          image: adrianoabreu/infnet-guia
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: guia-app
spec: 
  type: NodePort
  selector:
    app: guia-app
  ports:
    - port: 3000
      targetPort: 3000
---
# ========================
# PROMETHEUS CONFIG
# ========================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: [localhost:9090]
    
      - job_name: node_exporter
        static_configs:
          - targets: [127.0.0.1:9100]
---
# ========================
# PROMETHEUS PVC
# ========================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# ========================
# PROMETHEUS DEPLOYMENT
# ========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: default
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
            - --storage.tsdb.retention.time=7d
          ports:
            - name: web
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: web
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: web
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
        - name: node-exporter
          image: prom/node-exporter:v1.7.0
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/rootfs
            - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
            - --web.listen-address=127.0.0.1:9100
          ports:
            - name: metrics
              containerPort: 9100
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /rootfs
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
        - name: proc
          hostPath:
            path: /proc
            type: Directory
        - name: sys
          hostPath:
            path: /sys
            type: Directory
        - name: root
          hostPath:
            path: /
            type: Directory
---
# ========================
# PROMETHEUS SERVICE (INTERNO)
# ========================
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
# ========================
# GRAFANA DEPLOYMENT
# ========================
# Grafana: datasource + dashboard (métricas do Prometheus)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        uid: prometheus
        isDefault: true
        jsonData:
          timeInterval: 15s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: default
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Infnet
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: default
data:
  guia-infnet.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "links": [],
      "liveNow": false,
      "refresh": "10s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["infnet"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "timezone": "browser",
      "title": "Guia Infnet - Prometheus + Nó (lab)",
      "uid": "guia-infnet-prometheus",
      "version": 1,
      "panels": [
        {
          "type": "stat",
          "title": "Prometheus UP",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "up{job=\"prometheus\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "stat",
          "title": "Series no TSDB",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "prometheus_tsdb_head_series",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "stat",
          "title": "Amostras no ultimo scrape",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "scrape_samples_scraped{job=\"prometheus\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "stat",
          "title": "Memoria RSS (processo)",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "process_resident_memory_bytes{job=\"prometheus\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "timeseries",
          "title": "Amostras anexadas ao TSDB / s",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 4 },
          "id": 5,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "showPoints": "never"
              }
            }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(prometheus_tsdb_head_samples_appended_total[5m])",
              "legendFormat": "samples/s",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Duracao do scrape (seg)",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 4 },
          "id": 6,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "showPoints": "never"
              }
            }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "scrape_duration_seconds{job=\"prometheus\"}",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Node Exporter UP",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 13 },
          "id": 7,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "up{job=\"node_exporter\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "stat",
          "title": "CPU do nó (uso %)",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 13 },
          "id": 8,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 * (1 - avg(rate(node_cpu_seconds_total{job=\"node_exporter\",mode=\"idle\"}[5m])))",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percent", "decimals": 1, "min": 0, "max": 100 } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "stat",
          "title": "RAM do nó em uso",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 13 },
          "id": 9,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "node_memory_MemTotal_bytes{job=\"node_exporter\"} - node_memory_MemAvailable_bytes{job=\"node_exporter\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "stat",
          "title": "Disco livre (/)",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 13 },
          "id": 10,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(node_filesystem_avail_bytes{job=\"node_exporter\",fstype=~\"ext4|xfs|btrfs|ext3\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
        },
        {
          "type": "timeseries",
          "title": "CPU do nó — uso % (5m)",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 17 },
          "id": 11,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "showPoints": "never"
              }
            }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 * (1 - avg(rate(node_cpu_seconds_total{job=\"node_exporter\",mode=\"idle\"}[5m])))",
              "legendFormat": "uso %",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "RAM do nó — total vs disponivel",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 17 },
          "id": 12,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "showPoints": "never"
              }
            }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "node_memory_MemTotal_bytes{job=\"node_exporter\"}",
              "legendFormat": "total",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "node_memory_MemAvailable_bytes{job=\"node_exporter\"}",
              "legendFormat": "disponivel",
              "refId": "B"
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: default
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.2.3
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin123
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-json
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: default
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
